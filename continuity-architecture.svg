<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">OpenClaw Continuity architecture diagram</title>
  <desc id="desc">A professional architecture illustration showing chat input, staged memory, tracked follow-up, time sense, and frontstage-safe output.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fafc"/>
      <stop offset="100%" stop-color="#eef4f8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="150%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#57738b" flood-opacity="0.16"/>
    </filter>
    <style>
      .title { font: 700 58px -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif; fill: #21384a; }
      .sub { font: 400 24px -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif; fill: #556a78; }
      .h { font: 700 26px -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif; fill: #294152; }
      .b { font: 400 20px -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif; fill: #4f6574; }
      .k { font: 600 18px -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif; fill: #1f4255; }
    </style>
  </defs>

  <rect width="1600" height="900" rx="32" fill="url(#bg)"/>
  <text x="110" y="115" class="title">OpenClaw Continuity</text>
  <text x="110" y="160" class="sub">A state-backed layer between ordinary chat, staged memory, tracked follow-up, and frontstage-safe delivery.</text>

  <g filter="url(#shadow)">
    <rect x="95" y="240" width="280" height="490" rx="28" fill="#ffffff"/>
    <rect x="440" y="220" width="720" height="530" rx="32" fill="#ffffff"/>
    <rect x="1220" y="240" width="285" height="490" rx="28" fill="#ffffff"/>
  </g>

  <g>
    <text x="130" y="300" class="h">Input</text>
    <rect x="130" y="340" width="210" height="66" rx="20" fill="#eef7ff" stroke="#bdd9ee" stroke-width="3"/>
    <text x="164" y="381" class="k">normal chat</text>
    <rect x="130" y="430" width="210" height="66" rx="20" fill="#fff2e7" stroke="#efccb1" stroke-width="3"/>
    <text x="172" y="471" class="k">new chat /new</text>
    <rect x="130" y="520" width="210" height="66" rx="20" fill="#edf8ef" stroke="#c9e3cf" stroke-width="3"/>
    <text x="158" y="561" class="k">natural settings</text>
    <text x="130" y="640" class="b">Ordinary user turns,</text>
    <text x="130" y="672" class="b">new sessions, and</text>
    <text x="130" y="704" class="b">spoken config changes</text>
  </g>

  <g>
    <text x="476" y="280" class="h">Continuity Engine</text>
    <rect x="476" y="320" width="650" height="118" rx="24" fill="#f7fbff" stroke="#cadde9" stroke-width="3"/>
    <text x="510" y="360" class="k">Routing</text>
    <text x="510" y="395" class="b">casual_chat · staged_memory · tracked_followup</text>
    <text x="510" y="425" class="b">Keeps normal chat separate from continuity state</text>

    <rect x="476" y="470" width="300" height="108" rx="24" fill="#fff6ee" stroke="#efcfb3" stroke-width="3"/>
    <text x="510" y="510" class="k">Time Sense</text>
    <text x="510" y="545" class="b">elapsed time</text>
    <text x="510" y="573" class="b">day boundary · sleep boundary</text>

    <rect x="826" y="470" width="300" height="108" rx="24" fill="#eef8ff" stroke="#c7ddeb" stroke-width="3"/>
    <text x="860" y="510" class="k">Carryover</text>
    <text x="860" y="545" class="b">reconnects /new</text>
    <text x="860" y="573" class="b">to the right pending topic</text>

    <rect x="476" y="610" width="300" height="108" rx="24" fill="#eef9ef" stroke="#c9e3cf" stroke-width="3"/>
    <text x="510" y="650" class="k">Control</text>
    <text x="510" y="685" class="b">schedule, care, tracking, style</text>

    <rect x="826" y="610" width="300" height="108" rx="24" fill="#f7f1ff" stroke="#d8caf4" stroke-width="3"/>
    <text x="860" y="650" class="k">Guardrails</text>
    <text x="860" y="685" class="b">cooldown · closure · rest suppress</text>
  </g>

  <g>
    <text x="1255" y="300" class="h">Output</text>
    <rect x="1255" y="340" width="215" height="72" rx="20" fill="#fff7ef" stroke="#efcfb3" stroke-width="3"/>
    <text x="1290" y="383" class="k">care / follow-up</text>
    <rect x="1255" y="438" width="215" height="72" rx="20" fill="#eef8ff" stroke="#c7ddeb" stroke-width="3"/>
    <text x="1300" y="481" class="k">daily memory</text>
    <rect x="1255" y="536" width="215" height="72" rx="20" fill="#edf8ef" stroke="#c9e3cf" stroke-width="3"/>
    <text x="1302" y="579" class="k">clean frontstage</text>
    <text x="1255" y="650" class="b">Only structured, eligible</text>
    <text x="1255" y="682" class="b">content reaches the user.</text>
  </g>

  <path d="M355 465 C410 465, 425 465, 460 465" fill="none" stroke="#8ea8ba" stroke-width="8" stroke-linecap="round"/>
  <path d="M1135 530 C1170 530, 1180 530, 1217 530" fill="none" stroke="#8ea8ba" stroke-width="8" stroke-linecap="round"/>
  <polygon points="454,452 482,465 454,478" fill="#8ea8ba"/>
  <polygon points="1210,517 1238,530 1210,543" fill="#8ea8ba"/>
</svg>
