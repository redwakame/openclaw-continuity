<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">OpenClaw Continuity natural language settings comic</title>
  <desc id="desc">A bilingual comic panel showing users can modify OpenClaw Continuity behavior by natural language conversation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff4f4"/>
      <stop offset="52%" stop-color="#f6fff4"/>
      <stop offset="100%" stop-color="#edf6ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#8b7a6e" flood-opacity="0.24"/>
    </filter>
    <style>
      .title { font: 800 48px -apple-system, BlinkMacSystemFont, "Noto Sans CJK TC", "PingFang TC", Arial, sans-serif; fill: #5a2727; }
      .subtitle { font: 500 24px -apple-system, BlinkMacSystemFont, "Noto Sans CJK TC", "PingFang TC", Arial, sans-serif; fill: #5e5650; }
      .label { font: 800 24px -apple-system, BlinkMacSystemFont, "Noto Sans CJK TC", "PingFang TC", Arial, sans-serif; fill: #3d2a20; }
      .body { font: 500 21px -apple-system, BlinkMacSystemFont, "Noto Sans CJK TC", "PingFang TC", Arial, sans-serif; fill: #473f39; }
      .small { font: 500 18px -apple-system, BlinkMacSystemFont, "Noto Sans CJK TC", "PingFang TC", Arial, sans-serif; fill: #625a54; }
      .mono { font: 700 19px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #3f342f; }
    </style>
  </defs>
  <rect width="1400" height="820" rx="38" fill="url(#bg)"/>
  <path d="M1070 120 C1210 160 1240 300 1165 405" fill="none" stroke="#ffcfb8" stroke-width="28" stroke-linecap="round" opacity="0.55"/>
  <circle cx="185" cy="675" r="145" fill="#d9f1ff" opacity="0.65"/>

  <text x="70" y="88" class="title">3. Natural-Language Changes</text>
  <text x="70" y="126" class="subtitle">使用者直接用人話說，技能會轉成設定變更。</text>

  <g filter="url(#shadow)">
    <rect x="86" y="190" width="1228" height="465" rx="34" fill="#ffffff"/>
  </g>

  <g>
    <rect x="145" y="250" width="460" height="82" rx="28" fill="#edf8ff"/>
    <text x="175" y="284" class="body">User: Make follow-up quieter after midnight.</text>
    <text x="175" y="314" class="small">使用者：半夜不要主動追蹤我。</text>

    <rect x="145" y="374" width="455" height="96" rx="28" fill="#fff2de"/>
    <text x="175" y="412" class="body">User: Use recent 4 turns after /new.</text>
    <text x="175" y="444" class="small">使用者：新對話承接改成最近 4 輪摘要。</text>

    <rect x="145" y="512" width="455" height="82" rx="28" fill="#f2ecff"/>
    <text x="175" y="546" class="body">User: Stop after two unanswered check-ins.</text>
    <text x="175" y="576" class="small">使用者：兩次沒回就先停。</text>
  </g>

  <path d="M645 420 C700 386 744 386 800 420" fill="none" stroke="#9fcca2" stroke-width="14" stroke-linecap="round"/>
  <path d="M770 389 L808 420 L770 451" fill="none" stroke="#9fcca2" stroke-width="14" stroke-linecap="round"/>

  <g>
    <text x="855" y="255" class="label">Mapped to settings</text>
    <rect x="855" y="292" width="355" height="250" rx="28" fill="#f5fff0"/>
    <text x="885" y="335" class="mono">quiet_hours: updated</text>
    <text x="885" y="372" class="mono">new_session.mode:</text>
    <text x="912" y="405" class="mono">recent_4_turns_first</text>
    <text x="885" y="442" class="mono">max_unanswered: 2</text>
    <text x="885" y="492" class="small">No manual file editing required.</text>
    <text x="885" y="522" class="small">不用自己改設定檔。</text>
  </g>

  <rect x="92" y="705" width="1215" height="52" rx="26" fill="#ffffff" opacity="0.82"/>
  <text x="122" y="738" class="small">Key point: ordinary conversation can update behavior when the request is clear enough.</text>
</svg>
