<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">OpenClaw Continuity adjust anytime comic</title>
  <desc id="desc">A bilingual comic panel showing that users can adjust OpenClaw Continuity settings after installation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4fbff"/>
      <stop offset="50%" stop-color="#fff8ed"/>
      <stop offset="100%" stop-color="#f7f0ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#7d7492" flood-opacity="0.24"/>
    </filter>
    <style>
      .title { font: 800 48px -apple-system, BlinkMacSystemFont, "Noto Sans CJK TC", "PingFang TC", Arial, sans-serif; fill: #34264f; }
      .subtitle { font: 500 24px -apple-system, BlinkMacSystemFont, "Noto Sans CJK TC", "PingFang TC", Arial, sans-serif; fill: #5c5666; }
      .label { font: 800 24px -apple-system, BlinkMacSystemFont, "Noto Sans CJK TC", "PingFang TC", Arial, sans-serif; fill: #32293d; }
      .body { font: 500 21px -apple-system, BlinkMacSystemFont, "Noto Sans CJK TC", "PingFang TC", Arial, sans-serif; fill: #47414e; }
      .small { font: 500 18px -apple-system, BlinkMacSystemFont, "Noto Sans CJK TC", "PingFang TC", Arial, sans-serif; fill: #615b68; }
      .mono { font: 700 19px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #352d3d; }
    </style>
  </defs>
  <rect width="1400" height="820" rx="38" fill="url(#bg)"/>
  <circle cx="190" cy="145" r="130" fill="#cdefff" opacity="0.55"/>
  <circle cx="1195" cy="690" r="150" fill="#ffe4c3" opacity="0.55"/>

  <text x="70" y="88" class="title">2. Adjust Anytime</text>
  <text x="70" y="126" class="subtitle">不是只有第一次設定；中途也能打開設定、改節奏、改承接方式。</text>

  <g filter="url(#shadow)">
    <rect x="86" y="190" width="545" height="455" rx="34" fill="#ffffff"/>
    <rect x="768" y="190" width="545" height="455" rx="34" fill="#ffffff"/>
  </g>

  <g>
    <text x="125" y="248" class="label">User opens settings</text>
    <rect x="125" y="290" width="405" height="76" rx="24" fill="#eef8ff"/>
    <text x="153" y="323" class="body">User: Help me adjust follow-up.</text>
    <text x="153" y="352" class="small">使用者：幫我調整關心設定。</text>
    <rect x="178" y="430" width="330" height="120" rx="26" fill="#f6ecff"/>
    <text x="208" y="472" class="body">Choose a category:</text>
    <text x="208" y="508" class="mono">schedule / proactive</text>
    <text x="208" y="540" class="mono">tracking / continuity</text>
  </g>

  <path d="M650 410 C698 382 726 382 774 410" fill="none" stroke="#bfa7db" stroke-width="14" stroke-linecap="round"/>
  <path d="M746 379 L782 410 L746 441" fill="none" stroke="#bfa7db" stroke-width="14" stroke-linecap="round"/>

  <g>
    <text x="807" y="248" class="label">Only changed fields update</text>
    <rect x="807" y="290" width="420" height="82" rx="24" fill="#fff1d8"/>
    <text x="835" y="324" class="body">Agent: I will update only that setting.</text>
    <text x="835" y="354" class="small">Agent：只改你指定的欄位。</text>
    <rect x="852" y="430" width="315" height="120" rx="26" fill="#eaf8df"/>
    <text x="883" y="470" class="mono">old state preserved</text>
    <text x="883" y="505" class="mono">changed field applied</text>
    <text x="883" y="540" class="mono">trace stays auditable</text>
  </g>

  <rect x="92" y="705" width="1215" height="52" rx="26" fill="#ffffff" opacity="0.82"/>
  <text x="122" y="738" class="small">Key point: users can reopen guided settings later; the skill applies narrow, auditable changes.</text>
</svg>
