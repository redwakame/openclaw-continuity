<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">OpenClaw Continuity setup wizard comic</title>
  <desc id="desc">A bilingual comic panel showing that OpenClaw Continuity starts a setup wizard after installation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7e8"/>
      <stop offset="55%" stop-color="#eef9ff"/>
      <stop offset="100%" stop-color="#f7ffe8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#9e7d61" flood-opacity="0.24"/>
    </filter>
    <style>
      .title { font: 800 48px -apple-system, BlinkMacSystemFont, "Noto Sans CJK TC", "PingFang TC", Arial, sans-serif; fill: #5c321f; }
      .subtitle { font: 500 24px -apple-system, BlinkMacSystemFont, "Noto Sans CJK TC", "PingFang TC", Arial, sans-serif; fill: #5e5650; }
      .label { font: 800 24px -apple-system, BlinkMacSystemFont, "Noto Sans CJK TC", "PingFang TC", Arial, sans-serif; fill: #3d2a20; }
      .body { font: 500 21px -apple-system, BlinkMacSystemFont, "Noto Sans CJK TC", "PingFang TC", Arial, sans-serif; fill: #473f39; }
      .small { font: 500 18px -apple-system, BlinkMacSystemFont, "Noto Sans CJK TC", "PingFang TC", Arial, sans-serif; fill: #625a54; }
      .mono { font: 700 19px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #3f342f; }
    </style>
  </defs>
  <rect width="1400" height="820" rx="38" fill="url(#bg)"/>
  <circle cx="1220" cy="130" r="150" fill="#ffd6b6" opacity="0.5"/>
  <circle cx="165" cy="675" r="135" fill="#cdefff" opacity="0.65"/>

  <text x="70" y="88" class="title">1. Install → Setup Wizard</text>
  <text x="70" y="126" class="subtitle">安裝後先引導設定，不要求使用者自己猜設定檔。</text>

  <g filter="url(#shadow)">
    <rect x="70" y="180" width="370" height="470" rx="30" fill="#ffffff"/>
    <rect x="515" y="180" width="370" height="470" rx="30" fill="#ffffff"/>
    <rect x="960" y="180" width="370" height="470" rx="30" fill="#ffffff"/>
  </g>

  <g>
    <text x="105" y="235" class="label">Install</text>
    <rect x="105" y="270" width="275" height="62" rx="18" fill="#fff0dc"/>
    <text x="128" y="308" class="mono">openclaw skills install</text>
    <path d="M175 410 h190 a26 26 0 0 1 26 26 v92 a26 26 0 0 1-26 26 H175 a26 26 0 0 1-26-26 v-92 a26 26 0 0 1 26-26Z" fill="#fbd1a9"/>
    <text x="182" y="466" class="body">skills/</text>
    <text x="182" y="502" class="mono">personal-hooks</text>
    <text x="112" y="612" class="small">Copy or install the skill folder.</text>
    <text x="112" y="640" class="small">放到 OpenClaw 的 skills 目錄。</text>
  </g>

  <path d="M452 410 C482 390 492 390 522 410" fill="none" stroke="#9bbf9a" stroke-width="12" stroke-linecap="round"/>
  <path d="M502 386 L528 410 L502 434" fill="none" stroke="#9bbf9a" stroke-width="12" stroke-linecap="round"/>

  <g>
    <text x="550" y="235" class="label">Setup Wizard</text>
    <rect x="550" y="270" width="292" height="305" rx="24" fill="#edf8ff"/>
    <text x="580" y="318" class="body">Missing setup detected:</text>
    <text x="580" y="358" class="mono">timezone</text>
    <text x="580" y="393" class="mono">sleep_time</text>
    <text x="580" y="428" class="mono">wake_time</text>
    <text x="580" y="463" class="mono">/new mode</text>
    <text x="580" y="498" class="mono">care style</text>
    <text x="548" y="612" class="small">The agent asks guided questions.</text>
    <text x="548" y="640" class="small">安裝精靈會問必要設定。</text>
  </g>

  <path d="M897 410 C927 390 937 390 967 410" fill="none" stroke="#9bbf9a" stroke-width="12" stroke-linecap="round"/>
  <path d="M947 386 L973 410 L947 434" fill="none" stroke="#9bbf9a" stroke-width="12" stroke-linecap="round"/>

  <g>
    <text x="995" y="235" class="label">Ready</text>
    <rect x="995" y="276" width="285" height="82" rx="24" fill="#e9f8df"/>
    <text x="1024" y="310" class="body">Agent:</text>
    <text x="1024" y="340" class="small">I can now carry context</text>
    <text x="1024" y="368" class="small">after /new.</text>
    <rect x="995" y="405" width="285" height="100" rx="24" fill="#fff4d8"/>
    <text x="1024" y="442" class="body">Agent：</text>
    <text x="1024" y="474" class="small">我已知道作息、勿擾、</text>
    <text x="1024" y="502" class="small">新對話承接方式。</text>
    <text x="1002" y="612" class="small">No manual config digging first.</text>
    <text x="1002" y="640" class="small">不用一開始就翻設定檔。</text>
  </g>

  <rect x="70" y="705" width="1260" height="52" rx="26" fill="#ffffff" opacity="0.8"/>
  <text x="100" y="738" class="small">Key point: first install can guide users through required settings and preferences.</text>
</svg>
