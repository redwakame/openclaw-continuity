<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">OpenClaw Continuity 中文概念圖</title>
  <desc id="desc">以一般對話、暫存話題、正式追蹤、時間感與新對話接回為主題的中文技能概念圖。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff6eb"/>
      <stop offset="100%" stop-color="#f4fbff"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fff8f1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#d8c8bb" flood-opacity="0.35"/>
    </filter>
    <style>
      .title { font: 700 64px -apple-system, BlinkMacSystemFont, "Noto Sans CJK TC", "PingFang TC", sans-serif; fill: #7a2d18; }
      .subtitle { font: 400 28px -apple-system, BlinkMacSystemFont, "Noto Sans CJK TC", "PingFang TC", sans-serif; fill: #6d625d; }
      .section { font: 700 28px -apple-system, BlinkMacSystemFont, "Noto Sans CJK TC", "PingFang TC", sans-serif; fill: #5a3024; }
      .body { font: 400 22px -apple-system, BlinkMacSystemFont, "Noto Sans CJK TC", "PingFang TC", sans-serif; fill: #554d49; }
      .chip { font: 600 20px -apple-system, BlinkMacSystemFont, "Noto Sans CJK TC", "PingFang TC", sans-serif; fill: #7a2d18; }
      .small { font: 500 18px -apple-system, BlinkMacSystemFont, "Noto Sans CJK TC", "PingFang TC", sans-serif; fill: #6e625c; }
    </style>
  </defs>

  <rect width="1600" height="900" rx="40" fill="url(#bg)"/>
  <circle cx="1290" cy="135" r="180" fill="#ffe2cc" opacity="0.55"/>
  <circle cx="145" cy="765" r="150" fill="#dff3ff" opacity="0.7"/>

  <text x="110" y="140" class="title">OpenClaw Continuity</text>
  <text x="110" y="190" class="subtitle">讓 agent 的延續感、時間感、關心與追蹤，都有結構可依。</text>

  <g filter="url(#shadow)">
    <rect x="92" y="255" width="470" height="525" rx="36" fill="url(#panel)"/>
    <rect x="585" y="255" width="430" height="525" rx="36" fill="url(#panel)"/>
    <rect x="1038" y="255" width="470" height="525" rx="36" fill="url(#panel)"/>
  </g>

  <g>
    <text x="130" y="320" class="section">一般對話不被打斷</text>
    <text x="130" y="365" class="body">正常聊天、輕鬆口語、短句回覆，</text>
    <text x="130" y="400" class="body">不會被錯誤追蹤或亂掉的主動關心帶歪。</text>
    <rect x="130" y="450" width="150" height="48" rx="24" fill="#ffe7d2"/>
    <text x="158" y="481" class="chip">一般聊天</text>
    <rect x="294" y="450" width="170" height="48" rx="24" fill="#e6f6ff"/>
    <text x="322" y="481" class="chip">新開對話接回</text>
    <path d="M150 555 C210 520, 305 520, 360 555" fill="none" stroke="#d28a68" stroke-width="8" stroke-linecap="round"/>
    <path d="M215 628 q35 -72 108 -72 q68 0 98 49" fill="none" stroke="#86b4ca" stroke-width="8" stroke-linecap="round"/>
    <circle cx="205" cy="665" r="54" fill="#ffd4be"/>
    <circle cx="348" cy="650" r="54" fill="#d9f0ff"/>
    <circle cx="188" cy="648" r="7" fill="#6b4337"/>
    <circle cx="222" cy="648" r="7" fill="#6b4337"/>
    <path d="M188 680 q18 14 34 0" fill="none" stroke="#6b4337" stroke-width="5" stroke-linecap="round"/>
    <circle cx="331" cy="635" r="7" fill="#416273"/>
    <circle cx="365" cy="635" r="7" fill="#416273"/>
    <path d="M331 667 q18 14 34 0" fill="none" stroke="#416273" stroke-width="5" stroke-linecap="round"/>
    <text x="130" y="740" class="small">`/new` 之後仍能接回真正重要的上一段話題，</text>
    <text x="130" y="770" class="small">不是只剩下模糊的聊天印象。</text>
  </g>

  <g>
    <text x="620" y="320" class="section">時間感與關心有依據</text>
    <text x="620" y="365" class="body">看經過多久、是否跨日、是否跨睡眠邊界，</text>
    <text x="620" y="400" class="body">再決定是不是該關心、該追蹤、該安靜。</text>
    <circle cx="800" cy="525" r="108" fill="#fff0dd" stroke="#e1a87c" stroke-width="12"/>
    <circle cx="800" cy="525" r="16" fill="#7a2d18"/>
    <path d="M800 525 L800 455" stroke="#7a2d18" stroke-width="10" stroke-linecap="round"/>
    <path d="M800 525 L858 548" stroke="#7a2d18" stroke-width="10" stroke-linecap="round"/>
    <path d="M707 598 q92 88 186 0" fill="none" stroke="#8fbf9e" stroke-width="12" stroke-linecap="round"/>
    <circle cx="738" cy="452" r="26" fill="#e8f7ff"/>
    <text x="723" y="459" class="chip">夜</text>
    <circle cx="864" cy="452" r="26" fill="#fff4bf"/>
    <text x="849" y="459" class="chip">日</text>
    <rect x="658" y="645" width="110" height="46" rx="23" fill="#ffe7d2"/>
    <text x="683" y="675" class="chip">跨日</text>
    <rect x="786" y="645" width="130" height="46" rx="23" fill="#e6f6ff"/>
    <text x="814" y="675" class="chip">經過多久</text>
    <rect x="934" y="645" width="120" height="46" rx="23" fill="#eaf8e7"/>
    <text x="960" y="675" class="chip">作息階段</text>
    <text x="620" y="740" class="small">時間感不是單純報時，也不是看到隔天就硬說「昨天」。</text>
    <text x="620" y="770" class="small">它會根據真實時間差與睡醒邊界來表達。</text>
  </g>

  <g>
    <text x="1075" y="320" class="section">設定能用口語直接改</text>
    <text x="1075" y="365" class="body">不用卡在設定檔，也不用背很多指令。</text>
    <text x="1075" y="400" class="body">直接說話，就能改作息、關心與追蹤節奏。</text>
    <rect x="1084" y="452" width="378" height="82" rx="26" fill="#fff4ec" stroke="#efc8ac" stroke-width="4"/>
    <text x="1110" y="489" class="body">幫我調整關心設定</text>
    <text x="1110" y="520" class="small">把半夜主動關心調保守一點</text>
    <rect x="1084" y="558" width="378" height="82" rx="26" fill="#eef8ff" stroke="#c7deec" stroke-width="4"/>
    <text x="1110" y="595" class="body">Help me adjust my follow-up settings</text>
    <text x="1110" y="626" class="small">Check in less often after midnight</text>
    <rect x="1084" y="664" width="378" height="82" rx="26" fill="#eef9ef" stroke="#c9e3cb" stroke-width="4"/>
    <text x="1110" y="701" class="body">可調項目</text>
    <text x="1110" y="732" class="small">作息、關心頻率、追蹤節奏、互動風格</text>
  </g>
</svg>
